name: Build and Deploy

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: alfinzz/smart-pet-feeder
  BACKEND_DIR: backend
  MOBILE_DIR: mobile

jobs:
  backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Run Go tests
        working-directory: backend
        run: go test ./...

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Detect backend changes
        id: backend_changes
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --name-only HEAD^ HEAD | grep -q '^backend/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request' && steps.backend_changes.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag
            type=sha,prefix=

      - name: Build and push Docker image
        if: steps.backend_changes.outputs.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy via SSH
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.backend_changes.outputs.changed == 'true'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${{ secrets.VPS_SSH_PORT || '22' }}" -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts
          ssh -p "${{ secrets.VPS_SSH_PORT || '22' }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" << 'EOF'
            if [ -x /opt/docker-stack/applications/smart-pet-feeder/update.sh ]; then
              cd /opt/docker-stack/applications/smart-pet-feeder
              ./update.sh
            else
              echo "Initial Ansible deployment has not created update.sh yet; skipping SSH deploy."
            fi
          EOF

  mobile:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Analyze Flutter app
        working-directory: mobile
        run: flutter analyze --no-fatal-infos

      - name: Run Flutter tests
        working-directory: mobile
        run: flutter test

      - name: Create mobile environment file
        run: |
          if [ -z "${{ vars.API_BASE_URL }}" ]; then
            echo "API_BASE_URL repository variable is required for mobile builds."
            exit 1
          fi
          {
            echo "API_BASE_URL=${{ vars.API_BASE_URL }}"
            echo "DEVICE_ID=${{ vars.DEVICE_ID || 'ESP32-001' }}"
          } > mobile/.env

      - name: Validate mobile environment
        working-directory: mobile
        run: |
          . ./.env
          test -n "$API_BASE_URL"
          test -n "$DEVICE_ID"

      - name: Build Android APK
        working-directory: mobile
        run: |
          . ./.env
          flutter build apk --release \
            --dart-define=API_BASE_URL="$API_BASE_URL" \
            --dart-define=DEVICE_ID="$DEVICE_ID"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: smart-pet-feeder-android
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Prepare release APK asset
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: cp mobile/build/app/outputs/flutter-apk/app-release.apk "smart-pet-feeder-android-${GITHUB_REF_NAME}.apk"

      - name: Publish APK to GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: smart-pet-feeder-android-${{ github.ref_name }}.apk
          fail_on_unmatched_files: true
