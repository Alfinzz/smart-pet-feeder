name: Build and Deploy

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: alfinzz/smart-pet-feeder
  BACKEND_DIR: backend
  MOBILE_DIR: mobile

jobs:
  backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Run Go tests
        working-directory: backend
        run: go test ./...

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Detect backend changes
        id: backend_changes
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --name-only HEAD^ HEAD | grep -q '^backend/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request' && steps.backend_changes.outputs.changed == 'true'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag
            type=sha,prefix=

      - name: Build and push Docker image
        if: steps.backend_changes.outputs.changed == 'true'
        uses: docker/build-push-action@v7
        with:
          context: backend
          file: backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy via SSH
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && steps.backend_changes.outputs.changed == 'true'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${{ secrets.VPS_SSH_PORT || '22' }}" -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts
          ssh -p "${{ secrets.VPS_SSH_PORT || '22' }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" << 'EOF'
            set -euo pipefail
            cd /opt/friend-apps
            docker compose pull smart-pet-feeder
            docker compose up -d smart-pet-feeder
            for i in $(seq 1 30); do
              status="$(docker inspect -f '{{.State.Health.Status}}' smart-pet-feeder)"
              if [ "$status" = "healthy" ]; then
                echo "smart-pet-feeder is healthy"
                exit 0
              fi
              echo "Waiting for smart-pet-feeder healthcheck: $status"
              sleep 5
            done
            docker logs --tail 100 smart-pet-feeder
            exit 1
          EOF

  mobile:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Analyze Flutter app
        working-directory: mobile
        run: flutter analyze --no-fatal-infos

      - name: Run Flutter tests
        working-directory: mobile
        run: flutter test

      - name: Create mobile environment file
        run: |
          if [ -z "${{ vars.API_BASE_URL }}" ]; then
            echo "API_BASE_URL repository variable is required for mobile builds."
            exit 1
          fi
          {
            echo "API_BASE_URL=${{ vars.API_BASE_URL }}"
            echo "DEVICE_ID=${{ vars.DEVICE_ID || 'ESP32-001' }}"
          } > mobile/.env

      - name: Validate mobile environment
        working-directory: mobile
        run: |
          . ./.env
          test -n "$API_BASE_URL"
          test -n "$DEVICE_ID"

      - name: Build Android APK
        working-directory: mobile
        run: |
          . ./.env
          flutter build apk --release \
            --dart-define=API_BASE_URL="$API_BASE_URL" \
            --dart-define=DEVICE_ID="$DEVICE_ID"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: smart-pet-feeder-android
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Prepare release metadata
        if: github.event_name != 'pull_request'
        id: release
        shell: bash
        run: |
          version="$(awk '/^version:/ {print $2; exit}' mobile/pubspec.yaml | cut -d+ -f1)"
          if [ -z "$version" ]; then
            echo "Cannot determine mobile version from mobile/pubspec.yaml"
            exit 1
          fi

          short_sha="${GITHUB_SHA::7}"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            tag="$GITHUB_REF_NAME"
            asset="smart-pet-feeder-android-${tag}.apk"
          else
            tag="v${version}"
            asset="smart-pet-feeder-android-${tag}-${short_sha}.apk"
          fi

          cp mobile/build/app/outputs/flutter-apk/app-release.apk "$asset"
          {
            echo "tag=$tag"
            echo "asset=$asset"
            echo "name=$tag"
          } >> "$GITHUB_OUTPUT"

      - name: Publish APK to GitHub Release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.release.outputs.name }}
          body: |
            Automated APK build from `${{ github.sha }}`.

            Event: `${{ github.event_name }}`
            Branch/tag: `${{ github.ref_name }}`
          files: ${{ steps.release.outputs.asset }}
          fail_on_unmatched_files: true
          overwrite_files: true
          make_latest: true
